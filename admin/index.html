<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Axy Lusion</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --admin-amber: #c4851a;
            --admin-amber-glow: rgba(196, 133, 26, 0.25);
            --admin-bg: #0a0a0a;
            --admin-panel: rgba(26, 26, 26, 0.9);
            --admin-border: rgba(245, 230, 200, 0.12);
            --admin-text: #f5e6c8;
            --admin-muted: #bba98a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            align-items: center;
            background:
                radial-gradient(circle at top, rgba(196, 133, 26, 0.14), transparent 45%),
                linear-gradient(160deg, #050505 0%, #101010 55%, #1c1408 100%);
            color: var(--admin-text);
            display: flex;
            font-family: "Segoe UI", Arial, sans-serif;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .login-shell {
            background: var(--admin-panel);
            border: 1px solid var(--admin-border);
            border-radius: 20px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            max-width: 440px;
            padding: 40px 32px;
            text-align: center;
            width: 100%;
        }

        .brand {
            color: var(--admin-amber);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--admin-muted);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .note {
            background: rgba(196, 133, 26, 0.08);
            border: 1px solid rgba(196, 133, 26, 0.18);
            border-radius: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
            padding: 18px;
            text-align: left;
        }

        .note h1 {
            color: var(--admin-text);
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .note p {
            color: var(--admin-muted);
            font-size: 0.92rem;
        }

        .login-button {
            background: var(--admin-amber);
            border: none;
            border-radius: 999px;
            box-shadow: 0 0 0 0 var(--admin-amber-glow);
            color: #0a0a0a;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            padding: 14px 22px;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
            width: 100%;
        }

        .login-button:hover {
            background: #d79a33;
            box-shadow: 0 10px 30px var(--admin-amber-glow);
            transform: translateY(-1px);
        }

        .back-link {
            color: var(--admin-muted);
            display: inline-block;
            margin-top: 18px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--admin-text);
        }

        #cms-container {
            display: none;
            inset: 0;
            position: fixed;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-shell">
        <div class="brand">Axy Lusion</div>
        <p class="subtitle">Content management access</p>

        <div class="note">
            <h1>Before you log in</h1>
            <p>This admin area is ready for Decap CMS, but authentication still depends on Netlify Identity or GitHub OAuth being configured for the live site.</p>
        </div>

        <button class="login-button" type="button" onclick="openLogin()">Open Login</button>
        <a class="back-link" href="/">&larr; Back to website</a>
    </div>

    <div id="cms-container">
        <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    </div>

    <script>
        function showCMS() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("cms-container").style.display = "block";
            document.body.style.display = "block";
        }

        function showLogin() {
            document.getElementById("login-screen").style.display = "block";
            document.getElementById("cms-container").style.display = "none";
            document.body.style.display = "flex";
        }

        function openLogin() {
            if (!window.netlifyIdentity) {
                window.alert("Login is still loading. Please try again in a moment.");
                return;
            }

            window.netlifyIdentity.open("login");
        }

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", function(user) {
                if (user) {
                    showCMS();
                }
            });

            window.netlifyIdentity.on("login", function() {
                showCMS();
            });

            window.netlifyIdentity.on("logout", function() {
                showLogin();
            });
        }
    </script>
</body>
</html>
