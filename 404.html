<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Axy Lusion</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 2rem; }
        .error-code { font-family: var(--font-display, 'Outfit', sans-serif); font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent, #c4851a), var(--accent-light, #d4a03a)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .error-title { font-size: 1.5rem; font-weight: 600; color: var(--text-primary, #f5f5f5); margin-top: 0.5rem; }
        .error-text { max-width: 26rem; margin-top: 0.75rem; font-size: 0.9rem; color: var(--text-secondary, #9ca3af); line-height: 1.7; }
        .error-link { display: inline-flex; margin-top: 1.5rem; padding: 0.65rem 1.6rem; border-radius: 999px; font-weight: 600; font-size: 0.85rem; text-decoration: none; background: var(--accent, #c4851a); color: #000; transition: transform 0.15s; }
        .error-link:hover { transform: translateY(-2px); }
    </style>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
    <main class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Nothing here</h1>
        <p class="error-text">This page doesn't exist. Head back to the gallery or explore the tools and rankings.</p>
        <a href="index.html" class="error-link">Back to Axy Lusion</a>
    </main>
</body>
</html>
