    <rect x="250" y="178" width="700" height="322" rx="24" fill="#101010" stroke="#2d2419"/>
    <path d="M298 452 L448 302 L568 414 L646 338 L902 452" fill="none" stroke="#f0b453" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
