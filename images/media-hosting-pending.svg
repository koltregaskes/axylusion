<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Axy Lusion media hosting placeholder</title>
  <desc id="desc">A branded placeholder shown while durable gallery media hosting is being migrated.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="68%">
      <stop offset="0" stop-color="#f2c36b" stop-opacity="0.34"/>
      <stop offset="0.4" stop-color="#9b4f1b" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#090909" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="0.55" stop-color="#0d0d0d"/>
      <stop offset="1" stop-color="#030303"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
