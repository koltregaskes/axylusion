    <text x="600" y="575" text-anchor="middle" fill="#f8ead0" font-family="Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="3">AXY LUSION</text>
    <text x="600" y="622" text-anchor="middle" fill="#b9aa91" font-family="Arial, sans-serif" font-size="24" letter-spacing="1.5">MEDIA HOSTING MIGRATION</text>
