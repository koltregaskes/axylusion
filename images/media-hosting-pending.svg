  </defs>
  <rect width="1200" height="800" fill="#050505"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <g opacity="0.26" stroke="#f0b453" stroke-width="1">
    <path d="M0 120 C210 70 340 190 520 130 S870 80 1200 158" fill="none"/>
